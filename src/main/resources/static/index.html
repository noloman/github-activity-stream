<!DOCTYPE html>
<html lang="en">
<head>
    <title>GitHub Public Events Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #events { margin-top: 20px; }
        .event {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .event-repo { font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        .event-type { color: #fff; padding: 3px 6px; border-radius: 3px; display: inline-block; margin-right: 10px; }
        .event-type.PushEvent { background-color: #3498db; }
        .event-type.IssuesEvent { background-color: #e74c3c; }
        .event-type.PullRequestEvent { background-color: #2ecc71; }
        .event-time { color: #7f8c8d; font-size: 0.9em; float: right; }
    </style>
</head>
<body>
<h1>🚀 GitHub Public Events Dashboard</h1>
<div>
    <label for="event-type-filter">Filter by Event Type:</label>
    <select id="event-type-filter" onchange="filterEvents()">
        <option value="">All Event Types</option>
        <option value="PushEvent">Pushes</option>
        <option value="IssuesEvent">Issues</option>
        <option value="PullRequestEvent">Pull Requests</option>
        <option value="WatchEvent">Stars</option>
    </select>
</div>
<div id="historical-events"></div>
<div id="events"></div>

<!-- WebSocket Libraries -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.0/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);
    let allEvents = [];

    stompClient.connect({}, function() {
        console.log("Connected to WebSocket!");
        stompClient.subscribe('/topic/github-events', function(message) {
            const event = JSON.parse(message.body);
            allEvents.unshift(event); // Add to the beginning of the array
            renderEvents();
        });
    });

    function formatPayload(payload) {
        try {
            return JSON.stringify(JSON.parse(payload), null, 2);
        } catch (error) {
            console.error('Failed to parse payload JSON', error);
            return payload;
        }
    }

    function createEventElement(repoName, type, createdAt, payload) {
        const eventElement = document.createElement('div');
        eventElement.className = 'event';

        const header = document.createElement('div');

        const typeElement = document.createElement('span');
        typeElement.className = `event-type ${type}`;
        typeElement.textContent = type;

        const timeElement = document.createElement('span');
        timeElement.className = 'event-time';
        timeElement.textContent = new Date(createdAt).toLocaleString();

        header.appendChild(typeElement);
        header.appendChild(timeElement);

        const repoElement = document.createElement('div');
        repoElement.className = 'event-repo';
        repoElement.textContent = repoName;

        const payloadElement = document.createElement('pre');
        payloadElement.style.marginTop = '5px';
        payloadElement.style.fontSize = '0.85em';
        payloadElement.style.maxHeight = '200px';
        payloadElement.style.overflow = 'auto';
        payloadElement.textContent = formatPayload(payload);

        eventElement.appendChild(header);
        eventElement.appendChild(repoElement);
        eventElement.appendChild(payloadElement);

        return eventElement;
    }

    function renderEvents() {
        const filter = document.getElementById('event-type-filter').value;
        const eventsContainer = document.getElementById('events');
        eventsContainer.innerHTML = '';

        allEvents
            .filter(event => filter === '' || event.type === filter)
            .slice(0, 50) // Show max 50 events
            .forEach(event => {
                const eventElement = createEventElement(
                    event.repoName,
                    event.type,
                    event.createdAt,
                    event.payload
                );
                eventsContainer.appendChild(eventElement);
            });
    }

    function filterEvents() {
        renderEvents();
    }
    // Fetch and display historical events
    function fetchHistoricalEvents() {
        fetch('/api/v1/events/recent?hours=1')
            .then(response => response.json())
            .then(events => {
                const eventsContainer = document.getElementById('historical-events');
                eventsContainer.innerHTML = '<h2>Recent Events (Last Hour)</h2>';
                events.forEach(event => {
                    const eventElement = createEventElement(
                        event.repoName,
                        event.type,
                        event.createdAt,
                        event.payload
                    );
                    eventsContainer.appendChild(eventElement);
                });
            });
    }

    // Call this function when the page loads
    window.onload = fetchHistoricalEvents;
</script>
</body>
</html>

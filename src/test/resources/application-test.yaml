spring:
  kafka:
    listener:
      auto-startup: false
  datasource:
    url: jdbc:h2:mem:github_events;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

github:
  public-events:
    enabled: false
    auth-token:
